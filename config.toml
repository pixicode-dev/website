baseURL      = "https://pixicode.dev/"
languageCode = "fr-FR"
title        = "PixiCode"
theme        = "roxo-hugo-pixicode"
summaryLength = 25
disableKinds = ["taxonomy", "term"]
removePathAccents = true
# lastmod réels dans le sitemap (dérivés de l'historique git, nécessite
# fetch-depth: 0 dans le workflow de déploiement)
enableGitInfo = true

[frontmatter]
  lastmod = ["lastmod", ":git", "date", "publishDate"]

[build]
  writeStats = true
  
# --- MENUS ---
[menu]
  [[menu.nav]]
    name = "A propos"
    url = "about/"
    weight = 1
  [[menu.nav]]
    name = "Nos Services"
    url = "services/"
    weight = 2
  [[menu.nav]]
    name = "Portfolio"
    url = "portfolio/"
    weight = 3
  [[menu.nav]]
    name = "Blog"
    url = "blog/"
    weight = 4
  [[menu.nav]]
    name = "Devis en ligne"
    url = "devis-en-ligne/"
    weight = 5
  [[menu.nav]]
    name = "Contact"
    url = "contact/"
    weight = 6

# --- PARAMÈTRES GLOBAUX ---
[params]
  description = "PixiCode : Ingénierie Logicielle & Développement Sur-Mesure à Angoulême."
  author      = "PixiCode"
  # Images par défaut
  logo = "images/logo.svg"
  favicon_icon = "images/favicon.ico"
  favicon_shortcut_icon = "images/favicon.png"
  image = "images/og-default.jpg" # Pour le partage réseaux sociaux

  # Tracking Matomo
  matomo_url = "https://matomo.pixicode.dev/"
  matomo_id  = "1"

  # Styles
  custom_stylesheets = ["css/custom.scss"]

# --- IDENTITÉ CLIENT (Le propriétaire du site) ---
# NAP officiel (aligner la fiche Google Business et les annuaires sur ces valeurs)
[params.client]
  name    = "PixiCode"
  url     = "https://pixicode.dev"
  email   = "contact@pixicode.dev"
  phone   = "05 45 91 38 57"
  street      = "Technoparc Krysalide, 70 Rue Jean Doucet"
  city        = "Saint-Michel"
  postal_code = "16470"
  region      = "Nouvelle-Aquitaine"
  # Coordonnées du bureau (Technoparc Krysalide) — activent le bloc geo du
  # LocalBusiness dans le schema.
  latitude  = 45.6306889
  longitude = 0.1163791
  # Lien de la fiche d'établissement Google — émis en hasMap dans le schema.
  map_url = "https://share.google/L0ZdGB24VNhbarSpS"
  founder       = "Emric Pichonnier"
  founding_date = "2023"
  price_range   = "€€"

# --- IDENTITÉ AGENCE (Toi) ---
[params.agency]
  name   = "Pixicode"
  url    = "https://pixicode.dev"
  slogan = "Expert en éco-conception web"

# --- ESTIMATEUR DE DEVIS EN LIGNE (/devis-en-ligne/) ---
[params.estimateur]
  # URL du webhook n8n qui reçoit le formulaire et renvoie l'estimation.
  # Tant que ce champ est vide, l'estimateur tourne en MODE DÉMO (chiffres
  # illustratifs, aucun envoi) — pratique pour prévisualiser l'interface.
  webhook = "https://n8n.pixicode.dev/webhook/estimation"
  # Clé de site reCAPTCHA v3 (optionnel). Laisser vide pour désactiver.
  recaptcha_key = "6Lda03EqAAAAAJLVnbQpaUz_PzgYZEy0Acz68icf"

# --- SECTION HERO (Accueil) ---
[params.hero]
  enable           = true
  background_image = "images/Background.svg"
  
  # TITRE : On allie l'expertise technique à la valeur "Durable"
  title = "INGÉNIERIE LOGICIELLE SUR MESURE : LA PERFORMANCE DURABLE"
  
  # DESCRIPTION : On cible les décideurs (PME/Startup) avec les preuves techniques (Hugo, Flutter) et éthiques (INR)
  description = "Basée à Angoulême, PixiCode conçoit des solutions numériques architecturées pour durer. Sites, applications mobiles, logiciels métiers : chaque livrable est propriétaire, éco-conçu, et pensé pour que vous restiez maître de votre outil, sans abonnement captif ni dépendance tierce."
  
  image            = "images/screens.webp"
  image_alt        = "Aperçu d'applications mobiles Flutter et sites web éco-conçus par PixiCode"
  
  # BOUTONS D'ACTION : Plus orientés "Partenaire" que "Prestataire"
  primary_btn      = "Parlons de votre projet "
  primary_link     = "contact/"
  secondary_btn    = "Estimer mon projet en 2 min "
  secondary_link   = "devis-en-ligne/"

# --- AUTRES SECTIONS ---
[params.contactForm]
  action = "https://n8n.pixicode.dev/webhook/831edf69-f3b5-4d4f-8d73-00fb9afaaa0d"
  placeholder_first_name = "Prénom"
  placeholder_last_name = "Nom"
  placeholder_email = "Email"
  placeholder_about_the_project = "Racontez nous votre projet..."
  captcha_key = "6Lda03EqAAAAAJLVnbQpaUz_PzgYZEy0Acz68icf"

